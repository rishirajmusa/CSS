<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .text {
        background-color: aqua;
        display: inline;
    }

    .span {
        background-color: gray;
        display: block;
    }

    .inlineblcok {
        background-color: red;
        display: inline-block;

    }
</style>

<body>

    <p class="text">Lorem </p>

    <span class="span">This is a span</span>

    <p class="inlineblcok">Lorem ipsum dolor sit amet consectetur adipisicing elit. Officiis, dignissimos?</p>
    <!-- this inline block will behave like inline
     as long as text is within a line
     as soon as it crosses a line, it will behave like 
     block tag -->
</body>

</html>
