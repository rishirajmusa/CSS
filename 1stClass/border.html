<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        /* background-color: green; */
        width: 200px;
        height: 200px;

        border-width: 1rem;
        border-color: rgb(255, 7, 197);
        border-style: solid;
        /* above three statements can be 
        written as one like below  */
        border: green 1rem solid;
        /* you can write them in any order */

        
        border-top-left-radius: 30px;
        border-top-right-radius: 30px;
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px; 
        /* it will curve the borders */
        /* it can also written as */
        border-radius: 10px 50px 100px 150px;

        /* if we want the box to appear as a circle just give radius as 50% */
        border-radius: 50%;

        /* Another topic is padding */
        /* padding is space inside the box */

        padding: 50px;
        /* It will apply 50px padding to complete box */
        
        /* We can also make custom padding for each side  */
        padding-top: 20px;
        padding-bottom: 10px;
        padding-left: 30px;
        padding-right: 60px;

        /* it also has a shorthand */
        padding: 10px 20px 30px 40px;

        /* There is one more thing I forgot to add here, that is called Margin */
        /* When padding is space inside box, margin is space outside the box */
        margin-left: 40px;
        margin-top: 40px;
        /* And it's all the same as padding */



    }
</style>
<body>
    <div class="box">a</div>
    
</body>
</html>
